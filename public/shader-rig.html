<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Shader Rig</title>
        <style>
            :root {
                color-scheme: light;
                --clr-bg: #f7f4ee;
                --clr-page-sago-blue: #8ed8f4;
                --clr-surface: #ffffff;
                --clr-surface-glass: rgba(255, 255, 255, 0.8);
                --clr-surface-muted: #edf2f1;
                --clr-text: #15191d;
                --clr-text-muted: #5f6b73;
                --clr-border: rgba(21, 25, 29, 0.16);
                --clr-accent: #0d7f79;
                --clr-accent-dark: #095f5a;
                --clr-danger: #b13d2e;
                --space-4: 4px;
                --space-8: 8px;
                --space-12: 12px;
                --space-16: 16px;
                --space-20: 20px;
                --space-24: 24px;
                --space-32: 32px;
                --space-40: 40px;
                --radius-8: 8px;
                --shadow-panel:
                    0 1px 2px rgba(21, 25, 29, 0.08),
                    0 16px 48px rgba(21, 25, 29, 0.12);
                --font-body:
                    'IBM Plex Sans', 'Avenir Next', 'Segoe UI', sans-serif;
                --gradient-page: linear-gradient(
                    180deg,
                    var(--clr-bg) 0%,
                    var(--clr-bg) 42%,
                    var(--clr-page-sago-blue) 100%
                );
                --gradient-page-softener: linear-gradient(
                    180deg,
                    rgba(247, 244, 238, 0.72) 0%,
                    rgba(247, 244, 238, 0.52) 48%,
                    rgba(247, 244, 238, 0.16) 100%
                );
            }

            * {
                box-sizing: border-box;
            }

            [hidden] {
                display: none !important;
            }

            html,
            body {
                min-width: 320px;
                min-height: 100%;
                margin: 0;
                color: var(--clr-text);
                background-color: var(--clr-page-sago-blue);
                background-image: var(--gradient-page);
                font-family: var(--font-body);
                line-height: 1.5;
            }

            button,
            input,
            select,
            textarea {
                font: inherit;
            }

            button {
                min-height: var(--space-40);
                border: 0;
                border-radius: var(--radius-8);
                cursor: pointer;
            }

            button:focus-visible,
            input:focus-visible,
            select:focus-visible,
            textarea:focus-visible {
                outline: calc(var(--space-16) / 8) solid var(--clr-accent);
                outline-offset: calc(var(--space-16) / 8);
            }

            .preview {
                position: fixed;
                inset: 0;
                min-height: 100vh;
                background-color: var(--clr-page-sago-blue);
                background-image: var(--gradient-page);
            }

            .preview::after {
                position: absolute;
                inset: 0;
                background: var(--gradient-page-softener);
                content: '';
                pointer-events: none;
            }

            .stage {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                display: grid;
                grid-template-columns: minmax(320px, 420px) 1fr;
                gap: var(--space-24);
                padding: var(--space-24);
            }

            .panel {
                align-self: start;
                max-height: calc(100vh - var(--space-48));
                overflow: auto;
                padding: var(--space-20);
                background: var(--clr-surface-glass);
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-8);
                box-shadow: var(--shadow-panel);
                backdrop-filter: blur(var(--space-16)) saturate(1.08);
            }

            .panel__header {
                display: grid;
                gap: var(--space-4);
                margin-bottom: var(--space-20);
            }

            .panel__title {
                margin: 0;
                font-size: 1.25rem;
                line-height: 1.2;
            }

            .panel__meta {
                margin: 0;
                color: var(--clr-text-muted);
                font-size: 0.875rem;
            }

            .controls {
                display: grid;
                gap: var(--space-16);
            }

            .control {
                display: grid;
                gap: var(--space-8);
            }

            .control__top {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: var(--space-12);
            }

            .control__label,
            .control__value {
                font-size: 0.875rem;
                font-weight: 700;
            }

            .control__value {
                min-width: 64px;
                color: var(--clr-text-muted);
                text-align: right;
            }

            .control input[type='range'] {
                width: 100%;
                accent-color: var(--clr-accent);
            }

            .control input[type='color'] {
                width: 100%;
                height: var(--space-40);
                padding: var(--space-4);
                background: var(--clr-surface);
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-8);
            }

            .control select,
            .control textarea {
                width: 100%;
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-8);
                color: var(--clr-text);
                background: var(--clr-surface);
            }

            .control select {
                min-height: var(--space-40);
                padding: 0 var(--space-12);
            }

            .color-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: var(--space-12);
            }

            .actions {
                position: sticky;
                bottom: calc(var(--space-20) * -1);
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--space-8);
                padding-top: var(--space-16);
                padding-bottom: var(--space-20);
                background: linear-gradient(
                    rgba(255, 255, 255, 0),
                    var(--clr-surface-glass) var(--space-16)
                );
            }

            .button--primary {
                color: var(--clr-surface);
                background: var(--clr-accent);
            }

            .button--primary:hover {
                background: var(--clr-accent-dark);
            }

            .button--secondary {
                color: var(--clr-text);
                background: var(--clr-surface-muted);
            }

            .button--secondary:hover {
                background: var(--clr-surface);
            }

            .output {
                min-height: 240px;
                padding: var(--space-12);
                resize: vertical;
                font-family:
                    'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
                font-size: 0.75rem;
                line-height: 1.5;
            }

            .status {
                min-height: var(--space-24);
                margin: 0;
                color: var(--clr-text-muted);
                font-size: 0.875rem;
            }

            .status[data-tone='error'] {
                color: var(--clr-danger);
            }

            .content-ghost {
                align-self: start;
                justify-self: center;
                display: grid;
                gap: var(--space-24);
                width: min(100%, 420px);
                padding-top: var(--space-24);
                pointer-events: none;
            }

            .avatar {
                justify-self: center;
                width: 104px;
                height: 104px;
                background: rgba(255, 255, 255, 0.56);
                border: 1px solid var(--clr-border);
                border-radius: 50%;
            }

            .ghost-title,
            .ghost-line,
            .ghost-link {
                border-radius: var(--radius-8);
                background: rgba(255, 255, 255, 0.64);
                box-shadow: 0 1px 2px rgba(21, 25, 29, 0.08);
            }

            .ghost-title {
                justify-self: center;
                width: 168px;
                height: var(--space-32);
            }

            .ghost-line {
                justify-self: center;
                width: 256px;
                height: var(--space-16);
            }

            .ghost-list {
                display: grid;
                gap: var(--space-8);
            }

            .ghost-link {
                height: 64px;
            }

            @media (max-width: 860px) {
                .stage {
                    grid-template-columns: 1fr;
                    padding: var(--space-16);
                }

                .panel {
                    max-height: none;
                }

                .content-ghost {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <div id="shader" class="preview" aria-hidden="true"></div>

        <main class="stage">
            <section class="panel" aria-label="Shader controls">
                <header class="panel__header">
                    <h1 class="panel__title">Shader Rig</h1>
                    <p class="panel__meta">GrainGradient live settings</p>
                </header>

                <form class="controls" id="controls">
                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Shape</span>
                        </span>
                        <select data-setting="shape">
                            <option value="wave">Wave</option>
                            <option value="dots">Dots</option>
                            <option value="truchet">Truchet</option>
                            <option value="corners">Corners</option>
                            <option value="ripple">Ripple</option>
                            <option value="blob">Blob</option>
                            <option value="sphere">Sphere</option>
                        </select>
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Fit</span>
                        </span>
                        <select data-setting="fit">
                            <option value="cover">Cover</option>
                            <option value="contain">Contain</option>
                            <option value="none">None</option>
                        </select>
                    </label>

                    <div class="color-grid">
                        <label class="control">
                            <span class="control__top">
                                <span class="control__label">Back</span>
                            </span>
                            <input data-setting="colorBack" type="color" />
                        </label>

                        <label class="control">
                            <span class="control__top">
                                <span class="control__label">Color count</span>
                                <output
                                    class="control__value"
                                    data-value="colorCount"
                                ></output>
                            </span>
                            <input
                                data-setting="colorCount"
                                type="range"
                                min="1"
                                max="7"
                                step="1"
                            />
                        </label>
                    </div>

                    <div class="color-grid" id="colorControls"></div>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Softness</span>
                            <output
                                class="control__value"
                                data-value="softness"
                            ></output>
                        </span>
                        <input
                            data-setting="softness"
                            type="range"
                            min="0"
                            max="1"
                            step="0.01"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Intensity</span>
                            <output
                                class="control__value"
                                data-value="intensity"
                            ></output>
                        </span>
                        <input
                            data-setting="intensity"
                            type="range"
                            min="0"
                            max="1"
                            step="0.01"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Noise</span>
                            <output
                                class="control__value"
                                data-value="noise"
                            ></output>
                        </span>
                        <input
                            data-setting="noise"
                            type="range"
                            min="0"
                            max="1"
                            step="0.01"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Speed</span>
                            <output
                                class="control__value"
                                data-value="speed"
                            ></output>
                        </span>
                        <input
                            data-setting="speed"
                            type="range"
                            min="-2"
                            max="2"
                            step="0.01"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Scale</span>
                            <output
                                class="control__value"
                                data-value="scale"
                            ></output>
                        </span>
                        <input
                            data-setting="scale"
                            type="range"
                            min="0.1"
                            max="4"
                            step="0.01"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Rotation</span>
                            <output
                                class="control__value"
                                data-value="rotation"
                            ></output>
                        </span>
                        <input
                            data-setting="rotation"
                            type="range"
                            min="0"
                            max="360"
                            step="1"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Offset X</span>
                            <output
                                class="control__value"
                                data-value="offsetX"
                            ></output>
                        </span>
                        <input
                            data-setting="offsetX"
                            type="range"
                            min="-1"
                            max="1"
                            step="0.01"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Offset Y</span>
                            <output
                                class="control__value"
                                data-value="offsetY"
                            ></output>
                        </span>
                        <input
                            data-setting="offsetY"
                            type="range"
                            min="-1"
                            max="1"
                            step="0.01"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Max pixels</span>
                            <output
                                class="control__value"
                                data-value="maxPixelCount"
                            ></output>
                        </span>
                        <input
                            data-setting="maxPixelCount"
                            type="range"
                            min="400000"
                            max="3200000"
                            step="100000"
                        />
                    </label>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Min ratio</span>
                            <output
                                class="control__value"
                                data-value="minPixelRatio"
                            ></output>
                        </span>
                        <input
                            data-setting="minPixelRatio"
                            type="range"
                            min="1"
                            max="3"
                            step="0.25"
                        />
                    </label>

                    <div class="actions">
                        <button
                            class="button--secondary"
                            type="button"
                            id="resetButton"
                        >
                            Reset
                        </button>
                        <button
                            class="button--primary"
                            type="button"
                            id="saveButton"
                        >
                            Save
                        </button>
                    </div>

                    <p class="status" id="status" role="status">
                        Loading shader...
                    </p>

                    <label class="control">
                        <span class="control__top">
                            <span class="control__label">Saved context</span>
                        </span>
                        <textarea
                            class="output"
                            id="output"
                            readonly
                        ></textarea>
                    </label>
                </form>
            </section>

            <div class="content-ghost" aria-hidden="true">
                <div class="avatar"></div>
                <div class="ghost-title"></div>
                <div class="ghost-line"></div>
                <div class="ghost-list">
                    <div class="ghost-link"></div>
                    <div class="ghost-link"></div>
                    <div class="ghost-link"></div>
                    <div class="ghost-link"></div>
                    <div class="ghost-link"></div>
                </div>
            </div>
        </main>

        <script type="module">
            import {
                getShaderColorFromString,
                getShaderNoiseTexture,
                grainGradientFragmentShader,
                GrainGradientShapes,
                ShaderFitOptions,
                ShaderMount,
            } from 'https://esm.sh/@paper-design/shaders@0.0.76';

            const defaultSettings = {
                colorBack: '#f7f4ee',
                colorCount: 2,
                colors: [
                    '#f7f4ee',
                    '#8ed8f4',
                    '#ffffff',
                    '#edf2f1',
                    '#0d7f79',
                    '#5f6b73',
                    '#15191d',
                ],
                fit: 'cover',
                frame: 0,
                intensity: 0.15,
                maxPixelCount: 1200000,
                minPixelRatio: 2,
                noise: 0.25,
                offsetX: 0,
                offsetY: 0,
                originX: 0.5,
                originY: 0.5,
                rotation: 0,
                scale: 1,
                shape: 'wave',
                softness: 0.5,
                speed: 0.6,
                worldHeight: 0,
                worldWidth: 0,
            };

            const numberSettings = new Set([
                'colorCount',
                'intensity',
                'maxPixelCount',
                'minPixelRatio',
                'noise',
                'offsetX',
                'offsetY',
                'rotation',
                'scale',
                'softness',
                'speed',
            ]);
            const colorSlotCount = 7;
            const shaderElement = document.querySelector('#shader');
            const controlsElement = document.querySelector('#controls');
            const colorControlsElement =
                document.querySelector('#colorControls');
            const outputElement = document.querySelector('#output');
            const statusElement = document.querySelector('#status');
            const resetButton = document.querySelector('#resetButton');
            const saveButton = document.querySelector('#saveButton');
            const storageKey = 'hsichen.shaderRig';
            const valueElements = new Map(
                Array.from(document.querySelectorAll('[data-value]')).map(
                    (element) => [element.dataset.value, element]
                )
            );

            let settings = structuredClone(defaultSettings);
            let shaderMount = undefined;
            let noiseTexture = getShaderNoiseTexture();

            function setStatus(message, tone = 'default') {
                statusElement.textContent = message;
                statusElement.dataset.tone = tone;
            }

            async function waitForImage(image) {
                if (!image || image.complete) {
                    return;
                }

                await image.decode().catch(() => undefined);
            }

            function activeColors() {
                return settings.colors.slice(0, settings.colorCount);
            }

            function uniformsFromSettings() {
                return {
                    u_colorBack: getShaderColorFromString(settings.colorBack),
                    u_colors: activeColors().map((color) =>
                        getShaderColorFromString(color)
                    ),
                    u_colorsCount: settings.colorCount,
                    u_fit: ShaderFitOptions[settings.fit],
                    u_intensity: settings.intensity,
                    u_noise: settings.noise,
                    u_noiseTexture: noiseTexture,
                    u_offsetX: settings.offsetX,
                    u_offsetY: settings.offsetY,
                    u_originX: settings.originX,
                    u_originY: settings.originY,
                    u_rotation: settings.rotation,
                    u_scale: settings.scale,
                    u_shape: GrainGradientShapes[settings.shape],
                    u_softness: settings.softness,
                    u_worldHeight: settings.worldHeight,
                    u_worldWidth: settings.worldWidth,
                };
            }

            function componentPropsFromSettings() {
                const colors = activeColors()
                    .map((color) => `'${color}'`)
                    .join(', ');
                const optionalProps = [];

                if (settings.minPixelRatio !== defaultSettings.minPixelRatio) {
                    optionalProps.push(
                        `            minPixelRatio={${settings.minPixelRatio}}`
                    );
                }

                if (settings.rotation !== defaultSettings.rotation) {
                    optionalProps.push(
                        `            rotation={${settings.rotation}}`
                    );
                }

                if (settings.offsetX !== defaultSettings.offsetX) {
                    optionalProps.push(
                        `            offsetX={${settings.offsetX}}`
                    );
                }

                if (settings.offsetY !== defaultSettings.offsetY) {
                    optionalProps.push(
                        `            offsetY={${settings.offsetY}}`
                    );
                }

                return `<GrainGradient
            aria-hidden
            className='shader-background'
            colorBack='${settings.colorBack}'
            colors={[${colors}]}
            fit='${settings.fit}'
            intensity={${settings.intensity}}
            maxPixelCount={${settings.maxPixelCount}}
            noise={${settings.noise}}
            scale={${settings.scale}}
            shape='${settings.shape}'
            softness={${settings.softness}}
            speed={${settings.speed}}${
                optionalProps.length > 0 ? `\n${optionalProps.join('\n')}` : ''
            }
        />`;
            }

            function payloadFromSettings() {
                return {
                    componentProps: componentPropsFromSettings(),
                    savedAt: new Date().toISOString(),
                    settings: {
                        ...settings,
                        colors: activeColors(),
                    },
                };
            }

            function renderOutput() {
                outputElement.value = JSON.stringify(
                    payloadFromSettings(),
                    null,
                    2
                );
            }

            function hashFromSettings() {
                return `settings=${encodeURIComponent(
                    JSON.stringify(payloadFromSettings().settings)
                )}`;
            }

            function settingsFromHash() {
                const hash = window.location.hash.slice(1);

                if (!hash.startsWith('settings=')) {
                    return undefined;
                }

                try {
                    return JSON.parse(decodeURIComponent(hash.slice(9)));
                } catch (error) {
                    return undefined;
                }
            }

            function normalizeSavedSettings(savedSettings) {
                if (!savedSettings || typeof savedSettings !== 'object') {
                    return undefined;
                }

                const savedColors = Array.isArray(savedSettings.colors)
                    ? savedSettings.colors
                    : defaultSettings.colors;

                return {
                    ...defaultSettings,
                    ...savedSettings,
                    colors: [...savedColors, ...defaultSettings.colors].slice(
                        0,
                        colorSlotCount
                    ),
                };
            }

            function formatValue(key, value) {
                if (key === 'maxPixelCount') {
                    return Number(value).toLocaleString();
                }

                if (Number.isInteger(value)) {
                    return String(value);
                }

                return Number(value).toFixed(2);
            }

            function syncControls() {
                for (const element of controlsElement.querySelectorAll(
                    '[data-setting]'
                )) {
                    const key = element.dataset.setting;

                    if (key === 'colors') {
                        const index = Number(element.dataset.colorIndex);
                        element.value = settings.colors[index];
                        element.closest('.control').hidden =
                            index >= settings.colorCount;
                        continue;
                    }

                    element.value = String(settings[key]);
                }

                for (const [key, element] of valueElements) {
                    element.value = formatValue(key, settings[key]);
                }

                renderOutput();
            }

            function updateBodyFallback() {
                document.documentElement.style.backgroundColor =
                    settings.colorBack;
                document.body.style.backgroundColor = settings.colorBack;
                shaderElement.style.backgroundColor = settings.colorBack;
            }

            function updateShader() {
                if (!shaderMount) {
                    return;
                }

                shaderMount.setUniforms(uniformsFromSettings());
                shaderMount.setSpeed(settings.speed);
                shaderMount.setMaxPixelCount(settings.maxPixelCount);
                shaderMount.setMinPixelRatio(settings.minPixelRatio);
                updateBodyFallback();
                syncControls();
            }

            function resetShaderMount() {
                shaderMount?.dispose();
                shaderElement.replaceChildren();
                shaderMount = new ShaderMount(
                    shaderElement,
                    grainGradientFragmentShader,
                    uniformsFromSettings(),
                    undefined,
                    settings.speed,
                    settings.frame,
                    settings.minPixelRatio,
                    settings.maxPixelCount
                );
                updateBodyFallback();
                syncControls();
            }

            function renderColorControls() {
                colorControlsElement.replaceChildren();

                for (let index = 0; index < colorSlotCount; index += 1) {
                    const label = document.createElement('label');
                    label.className = 'control';

                    const top = document.createElement('span');
                    top.className = 'control__top';

                    const text = document.createElement('span');
                    text.className = 'control__label';
                    text.textContent = `Color ${index + 1}`;

                    const input = document.createElement('input');
                    input.dataset.setting = 'colors';
                    input.dataset.colorIndex = String(index);
                    input.type = 'color';

                    top.append(text);
                    label.append(top, input);
                    colorControlsElement.append(label);
                }
            }

            function readSettingChange(target) {
                const key = target.dataset.setting;

                if (key === 'colors') {
                    const index = Number(target.dataset.colorIndex);
                    settings.colors[index] = target.value;
                    return;
                }

                settings[key] = numberSettings.has(key)
                    ? Number(target.value)
                    : target.value;
            }

            function loadSavedSettings() {
                const hashSettings = normalizeSavedSettings(settingsFromHash());

                if (hashSettings) {
                    settings = hashSettings;
                    return 'url';
                }

                try {
                    const localPayload = JSON.parse(
                        localStorage.getItem(storageKey) ?? 'null'
                    );
                    const localSettings = normalizeSavedSettings(
                        localPayload?.settings
                    );

                    if (localSettings) {
                        settings = localSettings;
                        return 'local';
                    }
                } catch (error) {
                    return undefined;
                }

                return undefined;
            }

            function downloadPayload(payload) {
                const blob = new Blob([JSON.stringify(payload, null, 2)], {
                    type: 'application/json',
                });
                const href = URL.createObjectURL(blob);
                const anchor = document.createElement('a');

                anchor.download = 'shader-rig-context.json';
                anchor.href = href;
                anchor.click();
                URL.revokeObjectURL(href);
            }

            controlsElement.addEventListener('input', (event) => {
                if (!(event.target instanceof HTMLInputElement)) {
                    return;
                }

                readSettingChange(event.target);
                updateShader();
            });

            controlsElement.addEventListener('change', (event) => {
                if (
                    !(
                        event.target instanceof HTMLInputElement ||
                        event.target instanceof HTMLSelectElement
                    )
                ) {
                    return;
                }

                readSettingChange(event.target);
                updateShader();
            });

            resetButton.addEventListener('click', () => {
                settings = structuredClone(defaultSettings);
                localStorage.removeItem(storageKey);
                window.history.replaceState(
                    undefined,
                    '',
                    window.location.pathname
                );
                resetShaderMount();
                setStatus('Reset to app defaults.');
            });

            saveButton.addEventListener('click', async () => {
                saveButton.disabled = true;
                setStatus('Saving...');

                try {
                    const payload = payloadFromSettings();
                    localStorage.setItem(storageKey, JSON.stringify(payload));
                    window.history.replaceState(
                        undefined,
                        '',
                        `#${hashFromSettings()}`
                    );
                    downloadPayload(payload);
                    renderOutput();
                    await navigator.clipboard
                        .writeText(payload.componentProps)
                        .catch(() => undefined);
                    setStatus(
                        'Saved locally, copied snippet, updated URL, and downloaded JSON.'
                    );
                } catch (error) {
                    setStatus('Save failed.', 'error');
                } finally {
                    saveButton.disabled = false;
                }
            });

            renderColorControls();
            await waitForImage(noiseTexture);

            try {
                const loadedFrom = loadSavedSettings();
                resetShaderMount();
                setStatus(
                    loadedFrom === 'url'
                        ? 'Loaded settings from URL.'
                        : loadedFrom === 'local'
                          ? 'Loaded locally saved settings.'
                          : 'Ready. Save stores local context.'
                );
            } catch (error) {
                resetShaderMount();
                setStatus('Ready. Save stores local context.');
            }
        </script>
    </body>
</html>
